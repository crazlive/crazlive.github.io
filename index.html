<!DOCTYPE html>

<head>

.ctrl-btn{position:absolute;pointer-events:all;border-radius:50%;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:#fff;font-weight:bold;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}

#btnShield{bottom:110px;right:120px;width:60px;height:60px;background:rgba(0,150,255,0.35);border-color:rgba(0,200,255,0.7);font-size:22px;display:none;}
#btnBlast{bottom:20px;right:200px;width:60px;height:60px;background:rgba(150,0,255,0.35);border-color:rgba(200,0,255,0.7);font-size:22px;display:none;}
#btnPause{position:fixed;top:10px;right:60px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #fff;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;z-index:100;}
#btnSound{position:fixed;top:10px;right:10px;width:40px;height:40px;background:rgba(0,0,0,0.5);border:2px solid #fff;border-radius:8px;color:#fff;font-size:18px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;z-index:100;}

<script>
(function(){
'use strict';

// ==================== CONSTANTS ====================
const TILE = 32;

const MAX_FALL = 18;
const CANVAS_W = 800;
const CANVAS_H = 480;

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

function resize(){
  const sw=window.innerWidth, sh=window.innerHeight;
  const scale=Math.min(sw/CANVAS_W,sh/CANVAS_H);
  canvas.style.width=Math.floor(CANVAS_W*scale)+'px';
  canvas.style.height=Math.floor(CANVAS_H*scale)+'px';
  const ctrl=document.getElementById('controls');
  if(sw<sh&&sw<700){ctrl.style.display='block';}
  else{ctrl.style.display='none';}
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',resize);
resize();

// ==================== SOUND MANAGER ====================
const SoundManager = (function(){
  let ctx2=null,muted=false,bgNodes=[],bgPlaying=false;
  function init(){if(!ctx2){try{ctx2=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} }
  function beep(freq,dur,type='square',vol=0.3,startTime=0){
    if(muted||!ctx2)return;
    try{
      const o=ctx2.createOscillator(),g=ctx2.createGain();
      o.connect(g);g.connect(ctx2.destination);
      o.type=type;o.frequency.setValueAtTime(freq,ctx2.currentTime+startTime);
      g.gain.setValueAtTime(vol,ctx2.currentTime+startTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx2.currentTime+startTime+dur);
      o.start(ctx2.currentTime+startTime);o.stop(ctx2.currentTime+startTime+dur+0.01);
    }catch(e){}
  }
  function jump(){beep(350,0.08);setTimeout(()=>beep(500,0.15),80);}
  function coin(){beep(988,0.07,'sine',0.4);setTimeout(()=>beep(1319,0.15,'sine',0.4),80);}
  function mushroom(){[0,0.1,0.2,0.3].forEach((t,i)=>beep([262,330,392,523][i],0.08,'square',0.35,t));}
  function stomp(){beep(200,0.05,'square',0.5);setTimeout(()=>beep(100,0.1,'square',0.5),50);}
  function breakBrick(){[0,0.05,0.1,0.15].forEach((t,i)=>beep([400,350,300,200][i],0.05,'square',0.4,t));}
  function fireball(){beep(800,0.05,'sawtooth',0.2);setTimeout(()=>beep(600,0.1,'sawtooth',0.2),50);}
  function die(){[0,0.1,0.2,0.35,0.5].forEach((t,i)=>beep([392,330,262,196,130][i],0.15,'square',0.4,t));}
  function flagpole(){
    const notes=[392,494,587,698,784,880,988,1047];
    notes.forEach((f,i)=>beep(f,0.12,'square',0.3,i*0.1));
  }
  function gameOver(){
    [0,0.15,0.35,0.5,0.7,0.9].forEach((t,i)=>beep([523,494,440,415,392,330][i],0.25,'square',0.3,t));
  }
  function powerup(){
    const m=[659,698,784,659,784,988,1047];
    m.forEach((f,i)=>beep(f,0.08,'square',0.3,i*0.07));
  }
  function oneUp(){
    const n=[523,659,784,1047];
    n.forEach((f,i)=>beep(f,0.1,'square',0.35,i*0.08));
  }

  // Simple chiptune BGM
  const bgNotes=[
    [659,0.1],[659,0.1],[0,0.1],[659,0.1],[0,0.1],[523,0.1],[659,0.1],[0,0.1],
    [784,0.2],[0,0.2],[392,0.2],[0,0.2],
    [523,0.15],[0,0.1],[392,0.15],[0,0.1],[330,0.15],[0,0.05],[440,0.1],[494,0.1],[466,0.1],[440,0.1],[0,0.05],
    [392,0.1],[659,0.1],[784,0.1],[880,0.1],[698,0.1],[784,0.1],[0,0.05],[659,0.1],[0,0.05],[523,0.1],[587,0.1],[494,0.1]
  ];
  let bgTimeout=null;
  function playBG(fast=false){
    if(muted||!ctx2)return;
    if(bgPlaying)return;
    bgPlaying=true;
    let t=ctx2.currentTime+0.05;
    const factor=fast?0.7:1;
    bgNotes.forEach(([f,d])=>{
      if(f>0)beep(f,d*factor-0.02,'square',0.2,t-ctx2.currentTime);
      t+=d*factor;
    });
    bgTimeout=setTimeout(()=>{bgPlaying=false;if(!muted)playBG(fast);},t*1000-ctx2.currentTime*1000+100);
  }
  function stopBG(){bgPlaying=false;if(bgTimeout)clearTimeout(bgTimeout);}
  function toggleMute(){muted=!muted;if(muted)stopBG();document.getElementById('btnSound').textContent=muted?'🔇':'🔊';}
  return{init,jump,coin,mushroom,stomp,breakBrick,fireball,die,flagpole,gameOver,powerup,oneUp,playBG,stopBG,toggleMute,get muted(){return muted;}};
})();

// ==================== INPUT MANAGER ====================
const Input = (function(){
  const keys={};
  const state={left:false,right:false,jump:false,run:false,fire:false,shield:false,blast:false};
  const prev={jump:false,fire:false,shield:false,blast:false};
  document.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  });
  document.addEventListener('keyup',e=>{keys[e.code]=false;});
  function update(){
    prev.jump=state.jump;prev.fire=state.fire;prev.shield=state.shield;prev.blast=state.blast;
    state.left=!!(keys['ArrowLeft']||keys['KeyA']);
    state.right=!!(keys['ArrowRight']||keys['KeyD']);
    state.jump=!!(keys['ArrowUp']||keys['Space']||keys['KeyW']);
    state.run=!!(keys['ShiftLeft']||keys['ShiftRight']||keys['KeyZ']);
    state.fire=!!(keys['KeyX']||keys['ControlLeft']||keys['ControlRight']);
    state.shield=!!keys['KeyC'];
    state.blast=!!keys['KeyV'];
  }
  function justPressed(k){return state[k]&&!prev[k];}
  // Touch
  function addTouch(id,onDown,onUp){
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('touchstart',e=>{e.preventDefault();onDown()},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();onUp()},{passive:false});
    el.addEventListener('touchcancel',e=>{e.preventDefault();onUp()},{passive:false});
    el.addEventListener('mousedown',e=>{e.preventDefault();onDown()});
    el.addEventListener('mouseup',e=>{e.preventDefault();onUp()});
    el.addEventListener('mouseleave',e=>{e.preventDefault();onUp()});
  }
  addTouch('btnLeft',()=>keys['ArrowLeft']=true,()=>keys['ArrowLeft']=false);
  addTouch('btnRight',()=>keys['ArrowRight']=true,()=>keys['ArrowRight']=false);
  addTouch('btnJump',()=>keys['Space']=true,()=>keys['Space']=false);
  addTouch('btnFire',()=>keys['KeyX']=true,()=>keys['KeyX']=false);
  addTouch('btnShield',()=>keys['KeyC']=true,()=>keys['KeyC']=false);
  addTouch('btnBlast',()=>keys['KeyV']=true,()=>keys['KeyV']=false);
  return{update,state,justPressed};
})();

// ==================== TILE DEFINITIONS ====================
const T={AIR:0,BRICK:1,HARD:2,QUESTION:3,USED:4,PIPE_T:5,PIPE_B:6,GROUND:7,COIN_B:8,INV:9,STAIR:10};

// ==================== LEVEL MAP ====================
function buildLevel(){
  const W=220,H=15;
  const map=[];
  for(let r=0;r<H;r++){map.push(new Array(W).fill(T.AIR));}
  // Đảm bảo địa hình chắc chắn vượt qua được, làm lại map an toàn không lỗi góc kẹt
  for(let c=0;c<W;c++){
    if(!(c>=50&&c<=52)&&!(c>=85&&c<=87)&&!(c>=120&&c<=122)&&!(c>=155&&c<=157)){
      map[H-1][c]=T.GROUND;map[H-2][c]=T.GROUND;
    } else {
      // Tạo một block hard đỡ bên dưới hố sâu để tránh lỗi rớt không thể lên
      map[H-1][c]=T.HARD;
    }
  }
  function setRow(r,cs,ce,t){for(let c=cs;c<=ce;c++)if(c<W)map[r][c]=t;}
  
  setRow(9,5,5,T.QUESTION);
  setRow(9,7,7,T.QUESTION);
  setRow(9,9,9,T.QUESTION);
  setRow(9,6,6,T.BRICK);
  setRow(9,8,8,T.BRICK);
  
  map[H-3][13]=T.PIPE_T;map[H-3][14]=T.PIPE_T;
  map[H-2][13]=T.PIPE_B;map[H-2][14]=T.PIPE_B;
  
  setRow(9,20,24,T.BRICK);
  setRow(9,22,22,T.QUESTION);
  
  map[H-4][28]=T.PIPE_T;map[H-4][29]=T.PIPE_T;
  map[H-3][28]=T.PIPE_B;map[H-3][29]=T.PIPE_B;
  map[H-2][28]=T.PIPE_B;map[H-2][29]=T.PIPE_B;
  
  setRow(6,33,33,T.QUESTION);
  setRow(9,35,38,T.BRICK);
  setRow(9,36,36,T.QUESTION);
  
  for(let i=0;i<4;i++){for(let r=H-2-i;r<=H-2;r++) map[r][42+i]=T.STAIR;}
  
  setRow(9,55,58,T.HARD);
  setRow(7,62,66,T.BRICK);
  setRow(7,64,64,T.QUESTION);
  map[10][68]=T.INV;
  
  map[H-5][70]=T.PIPE_T;map[H-5][71]=T.PIPE_T;
  map[H-4][70]=T.PIPE_B;map[H-4][71]=T.PIPE_B;
  map[H-3][70]=T.PIPE_B;map[H-3][71]=T.PIPE_B;
  map[H-2][70]=T.PIPE_B;map[H-2][71]=T.PIPE_B;
  
  setRow(9,84,89,T.HARD);
  setRow(6,92,96,T.BRICK);
  setRow(9,92,96,T.BRICK);
  
  for(let i=0;i<4;i++) for(let r=H-2-i;r<=H-2;r++) map[r][110+i]=T.STAIR;
  for(let i=3;i>=0;i--) for(let r=H-2-i;r<=H-2;r++) map[r][115+i]=T.STAIR;
  
  setRow(8,130,134,T.QUESTION);
  
  // Khu vực chiến đấu Boss trống trải dễ di chuyển qua lại
  setRow(H-2,140,180,T.GROUND);
  
  for(let i=0;i<8;i++) for(let r=H-2-i;r<=H-2;r++) map[r][200+i]=T.STAIR;
  
  setRow(H-2,208,216,T.HARD);
  setRow(H-3,208,216,T.HARD);
  setRow(H-4,208,216,T.HARD);

  [10,25,40,60,75,90,105,130,160].forEach(c=>{
    map[2][c]=12;map[2][c+1]=12;map[2][c+2]=12;
    map[3][c-1]=12;map[3][c]=12;map[3][c+1]=12;map[3][c+2]=12;map[3][c+3]=12;
  });
  return{map,W,H};
}

const levelData=buildLevel();

const qContents={
  '9_5':'coin','9_7':'mushroom','9_9':'coin',
  '9_22':'coin','6_33':'flower','9_36':'coin',
  '7_64':'coin','6_88':'flower','9_88':'coin',
  '8_130':'coin','8_131':'coin','8_132':'coin','8_133':'coin','8_134':'coin',
};

// ==================== PARTICLES ====================
class Particle{
  constructor(x,y,vx,vy,color,life=40,size=4){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.color=color;this.life=life;this.maxLife=life;this.size=size;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;this.life--;}
  draw(cx,cam){
    const sx=this.x-cam.x,sy=this.y-cam.y;
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.fillStyle=this.color;
    ctx.fillRect(sx,sy,this.size,this.size);
    ctx.globalAlpha=1;
  }
}

// ==================== NEW PROJECTILES & WEAPONS ====================
class Bullet {
  constructor(x, y, dir, type = 'pistol', vy = 0) {
    this.x = x; this.y = y; this.vx = dir * (type === 'pistol' ? 10 : 8); this.vy = vy;
    this.type = type; this.dead = false; this.width = 8; this.height = 4;
  }
  update(map, H, W, enemies, boss, particles, game) {
    this.x += this.vx; this.y += this.vy;
    if (Math.abs(this.x - game.player.x) > CANVAS_W) { this.dead = true; return; }
    for (let e of enemies) {
      if (!e.dead && this.x > e.left && this.x < e.right && this.y > e.top && this.y < e.bottom) {
        e.stomped([], particles, game); this.dead = true; return;
      }
    }
    if (boss && !boss.dead && this.x > boss.left && this.x < boss.right && this.y > boss.top && this.y < boss.bottom) {
      boss.hit(this.type === 'shotgun' ? 3 : 2, particles, game); this.dead = true; return;
    }
  }
  draw(cam) {
    ctx.fillStyle = this.type === 'pistol' ? '#ff0' : '#f50';
    ctx.fillRect(this.x - cam.x, this.y - cam.y, this.width, this.height);
  }
}

class BlastWave {
  constructor(x, y, dir) {
    this.x = x; this.y = y; this.vx = dir * 7; this.dead = false; this.width = 24; this.height = 40;
  }
  update(map, H, W, enemies, boss, particles, game) {
    this.x += this.vx;
    if (Math.abs(this.x - game.player.x) > CANVAS_W) { this.dead = true; return; }
    for (let e of enemies) {
      if (!e.dead && this.x + this.width > e.left && this.x < e.right && this.y + this.height > e.top && this.y < e.bottom) {
        e.stomped([], particles, game);
      }
    }
    if (boss && !boss.dead && this.x + this.width > boss.left && this.x < boss.right && this.y + this.height > boss.top && this.y < boss.bottom) {
      boss.hit(4, particles, game);
    }
  }
  draw(cam) {
    ctx.fillStyle = 'rgba(150, 0, 255, 0.5)';
    ctx.fillRect(this.x - cam.x, this.y - cam.y, this.width, this.height);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(this.x - cam.x, this.y - cam.y, this.width, this.height);
  }
}

class SkillItem {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type; // 'shotgun', 'shield', 'blast'
    this.vy = -4; this.vx = 1; this.dead = false; this.width = TILE; this.height = TILE;
  }
  update(map, H, W, player, game) {
    this.vy = Math.min(this.vy + 0.3, 8);
    this.x += this.vx; this.y += this.vy;
    if (this.y > H * TILE) { this.dead = true; return; }
    let r = Math.floor((this.y + this.height) / TILE);
    if (r < H) {
      let c = Math.floor(this.x / TILE);
      if (isSolid(map[r] && map[r][c])) { this.y = r * TILE - this.height; this.vy = 0; }
    }
    if (player && this.x + this.width > player.left && this.x < player.right && this.y + this.height > player.top && this.y < player.bottom) {
      if (this.type === 'shotgun') { player.weapon = 'shotgun'; }
      if (this.type === 'shield') { player.hasShield = true; document.getElementById('btnShield').style.display = 'flex'; }
      if (this.type === 'blast') { player.hasBlast = true; document.getElementById('btnBlast').style.display = 'flex'; }
      this.dead = true; SoundManager.powerup();
    }
  }
  draw(cam) {
    let sx = this.x - cam.x; let sy = this.y - cam.y;
    ctx.fillStyle = '#000'; ctx.fillRect(sx, sy, TILE, TILE);
    ctx.strokeStyle = '#fff'; ctx.strokeRect(sx, sy, TILE, TILE);
    ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    let icon = '🔫';
    if (this.type === 'shield') icon = '🛡️';
    if (this.type === 'blast') icon = '⚡';
    ctx.fillText(icon, sx + TILE / 2, sy + TILE / 2);
  }
}

// ==================== BOSS KARIN DEPTRAI ====================
class BossKarinDepTrai {
  constructor(x, y) {
    this.x = x; this.y = y; this.width = 85; this.height = 120;
    this.maxHp = 100; this.hp = 100; this.vx = -0.6; this.dead = false; this.hurtTimer = 0;
  }
  get top() { return this.y; } get bottom() { return this.y + this.height; }
  get left() { return this.x; } get right() { return this.x + this.width; }
  hit(damage, particles, game) {
    if (this.dead) return;
    this.hp -= damage; this.hurtTimer = 10;
    for (let i = 0; i < 4; i++) {
      particles.push(new Particle(this.x + Math.random() * this.width, this.y + Math.random() * this.height, -2 + Math.random() * 4, -2 + Math.random() * 4, '#f00', 20, 4));
    }
    if (this.hp <= 0) {
      this.dead = true; game.addScore(10000);
      for (let i = 0; i < 25; i++) {
        particles.push(new Particle(this.x + this.width / 2, this.y + this.height / 2, -4 + Math.random() * 8, -4 + Math.random() * 8, '#f80', 50, 6));
      }
    }
  }
  update(map, H, W, player, game) {
    if (this.dead) return;
    if (this.hurtTimer > 0) this.hurtTimer--;
    this.x += this.vx;
    if (this.x < game.camera.x + 150) this.vx = 0.6;
    if (this.x > game.camera.x + CANVAS_W - this.width) this.vx = -0.6;
    this.y = 5 * TILE + Math.sin(game.tick * 0.04) * 20;

    if (player && !player.dying && player.right > this.left && player.left < this.right && player.bottom > this.top && player.top < this.bottom) {
      if (player.shieldActive > 0) {
        player.shieldActive = 0; player.invincible = 45; this.hit(10, game.particles, game);
      } else {
        player.hit(game);
      }
    }
  }
  draw(cam) {
    if (this.dead) return;
    let sx = this.x - cam.x; let sy = this.y - cam.y;
    ctx.fillStyle = this.hurtTimer > 0 ? '#fff' : '#1a1a1a';
    ctx.fillRect(sx, sy, this.width, this.height);
    ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 4; ctx.strokeRect(sx, sy, this.width, this.height);
    ctx.fillStyle = '#f00'; ctx.fillRect(sx + 20, sy + 30, 14, 14); ctx.fillRect(sx + 50, sy + 30, 14, 14);
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(sx + 25, sy + 75); ctx.lineTo(sx + 35, sy + 85); ctx.lineTo(sx + 45, sy + 75); ctx.lineTo(sx + 55, sy + 85); ctx.lineTo(sx + 65, sy + 75); ctx.fill();
    
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Boss Karin DepTrai', sx + this.width / 2, sy - 25);
    ctx.fillStyle = '#444'; ctx.fillRect(sx - 10, sy - 15, this.width + 20, 8);
    ctx.fillStyle = '#f00'; ctx.fillRect(sx - 10, sy - 15, (this.width + 20) * (this.hp / this.maxHp), 8);
  }
}

// ==================== SPRITES ====================
function pixelRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(x,y,w,h);}

function drawMario(x,y,state,dir,frame,cam){
  const sx=Math.floor(x-cam.x),sy=Math.floor(y-cam.y);
  const big=state==='big'||state==='fire';
  const fire=state==='fire';
  const W=TILE,H=big?TILE*2:TILE;
  if(big){
    ctx.fillStyle='#c00';ctx.fillRect(sx+6,sy,20,6);
    ctx.fillStyle='#c00';ctx.fillRect(sx+4,sy+6,24,6);
    ctx.fillStyle='#f9c990';ctx.fillRect(sx+4,sy+12,24,10);
    ctx.fillStyle='#5c3300';ctx.fillRect(sx+6,sy+16,4,4);ctx.fillRect(sx+22,sy+16,4,4);
    ctx.fillStyle='#5c3300';ctx.fillRect(sx+8,sy+20,16,4);
    ctx.fillStyle='#5c3300';ctx.fillRect(sx+4,sy+12,6,6);ctx.fillRect(sx+22,sy+12,6,6);
    ctx.fillStyle=fire?'#fff':'#c00';ctx.fillRect(sx+4,sy+22,24,12);
    ctx.fillStyle='#2244cc';ctx.fillRect(sx+4,sy+34,24,14);
    ctx.fillStyle='#f9c990';ctx.fillRect(sx+12,sy+34,4,4);ctx.fillRect(sx+20,sy+34,4,4);
    ctx.fillStyle='#5c3300';
    if(frame===1&&dir===1){ctx.fillRect(sx+4,sy+48,14,8);ctx.fillRect(sx+18,sy+46,12,8);}
    else if(frame===1&&dir===-1){ctx.fillRect(sx+14,sy+48,14,8);ctx.fillRect(sx+2,sy+46,12,8);}
    else{ctx.fillRect(sx+2,sy+48,14,8);ctx.fillRect(sx+16,sy+48,14,8);}
    ctx.fillStyle=fire?'#fff':'#c00';
    if(dir===1){ctx.fillRect(sx+26,sy+22,6,10);ctx.fillRect(sx-2,sy+24,8,8);}
    else{ctx.fillRect(sx-2,sy+22,6,10);ctx.fillRect(sx+26,sy+24,8,8);}
  } else {
    ctx.fillStyle='#c00';ctx.fillRect(sx+8,sy,16,6);ctx.fillRect(sx+4,sy+4,24,4);
    ctx.fillStyle='#f9c990';ctx.fillRect(sx+4,sy+8,24,8);
    ctx.fillStyle='#5c3300';ctx.fillRect(sx+6,sy+10,4,3);ctx.fillRect(sx+20,sy+10,4,3);
    ctx.fillStyle='#5c3300';ctx.fillRect(sx+8,sy+14,16,3);
    ctx.fillStyle=fire?'#fff':'#c00';ctx.fillRect(sx+6,sy+16,20,8);
    ctx.fillStyle='#2244cc';ctx.fillRect(sx+4,sy+24,24,6);
    ctx.fillStyle='#5c3300';
    if(frame===1){ctx.fillRect(sx+2,sy+28,12,4);ctx.fillRect(sx+18,sy+26,12,4);}
    else{ctx.fillRect(sx+2,sy+28,12,4);ctx.fillRect(sx+18,sy+28,12,4);}
    ctx.fillStyle='#f9c990';ctx.fillRect(sx+2,sy+16,4,6);ctx.fillRect(sx+26,sy+16,4,6);
  }
}

function drawFlower(x,y,frame,cam){

function drawStar(x,y,frame,cam){

  ctx.beginPath();pts.forEach(([px,py],i)=>{i?ctx.lineTo(sx+px,sy+py):ctx.moveTo(sx+px,sy+py);});
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(sx+10,sy+8,4,4);
}

function drawFireball(x,y,cam){

  ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(sx+8,sy+8,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx+6,sy+6,2,0,Math.PI*2);ctx.fill();
}

function drawTile(r,c,type,cam,tick){
  const sx=c*TILE-cam.x,sy=r*TILE-cam.y;
  if(sx<-TILE||sx>CANVAS_W||sy<-TILE||sy>CANVAS_H)return;
  switch(type){
    case T.GROUND:
      ctx.fillStyle='#8B4513';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#228B22';ctx.fillRect(sx,sy,TILE,8);
      ctx.fillStyle='#6B3410';ctx.fillRect(sx+2,sy+10,4,4);ctx.fillRect(sx+14,sy+18,4,4);ctx.fillRect(sx+22,sy+10,4,4);
      break;
    case T.BRICK:
      ctx.fillStyle='#c84b10';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#a03808';
      ctx.fillRect(sx,sy+2,TILE,2);ctx.fillRect(sx,sy+18,TILE,2);
      ctx.fillRect(sx+2,sy,2,TILE);ctx.fillRect(sx+18,sy,2,TILE);
      ctx.fillRect(sx+10,sy+10,2,TILE);
      break;
    case T.HARD:
      ctx.fillStyle='#aaa';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#999';ctx.fillRect(sx+2,sy+2,28,28);
      ctx.fillStyle='#bbb';ctx.fillRect(sx,sy,2,TILE);ctx.fillRect(sx,sy,TILE,2);
      ctx.fillStyle='#888';ctx.fillRect(sx+30,sy,2,TILE);ctx.fillRect(sx,sy+30,TILE,2);
      break;
    case T.QUESTION:
    case T.USED: {
      const c2=type===T.QUESTION?'#f80':'#888';
      ctx.fillStyle=c2;ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#000';ctx.fillRect(sx+2,sy+2,28,28);
      ctx.fillStyle=c2;ctx.fillRect(sx+4,sy+4,24,24);
      if(type===T.QUESTION){
        ctx.fillStyle='#fff';ctx.font='bold 22px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('?',sx+TILE/2,sy+TILE/2+1);
      } else {
        ctx.fillStyle='#aaa';ctx.fillRect(sx+10,sy+10,12,12);
      }
      break;
    }
    case T.PIPE_T:
    case T.PIPE_B: {
      const px=sx,py=sy;
      ctx.fillStyle='#1a8a1a';ctx.fillRect(px,py,TILE,TILE);
      if(type===T.PIPE_T){
        ctx.fillStyle='#2da82d';ctx.fillRect(px-4,py,TILE+8,TILE);
        ctx.fillStyle='#1a5c1a';ctx.fillRect(px+4,py+4,TILE-8,TILE-8);
        ctx.fillStyle='#3cc83c';ctx.fillRect(px-2,py+2,8,TILE-8);
      } else {
        ctx.fillStyle='#1a5c1a';ctx.fillRect(px+4,py,TILE-8,TILE);
      }
      break;
    }
    case T.STAIR:
      ctx.fillStyle='#888';ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#aaa';ctx.fillRect(sx,sy,TILE,4);ctx.fillRect(sx,sy+2,4,TILE);
      ctx.fillStyle='#666';ctx.fillRect(sx,sy+28,TILE,4);ctx.fillRect(sx+28,sy,4,TILE);
      break;
    case T.COIN_B:
      drawCoin(sx,sy,tick*0.1,{x:0,y:0});
      break;
    case 12:
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.fillRect(sx+4,sy+8,24,16);ctx.fillRect(sx,sy+12,32,12);
      break;
  }
}

function drawBG(cam, tick){

  else if(timeCycle === 1) ctx.fillStyle='#e66025'; // Hoàng hôn

// ==================== CAMERA ====================
class Camera{
  constructor(){this.x=0;this.y=0;}
  follow(player,mapW){
    this.x=player.x-CANVAS_W/3;
    this.x=Math.max(0,Math.min(this.x,mapW*TILE-CANVAS_W));
    this.y=0;
  }
}

// ==================== PLAYER ====================
class Player{
  constructor(){this.reset();this.weapon='pistol';this.hasShield=false;this.hasBlast=false;this.shieldActive=0;}
  reset(){
    this.x=2*TILE;this.y=10*TILE;
    this.vx=0;this.vy=0;
    this.state='small';
    this.onGround=false;
    this.dir=1;
    this.frame=0;this.frameTick=0;
    this.jumpHeld=false;this.jumpTime=0;
    this.fireballCooldown=0;
    this.invincible=0;
    this.starTimer=0;
    this.dead=false;
    this.dying=false;
    this.dyingTimer=0;
    this.width=TILE-4;
    this.height=this.state==='small'?TILE-4:TILE*2-4;
    this.climbing=false;
  }
  get top(){return this.y;}
  get bottom(){return this.y+this.height;}
  get left(){return this.x+2;}
  get right(){return this.x+this.width+2;}
  get cx(){return this.x+TILE/2;}
  get cy(){return this.y+this.height/2;}

  update(map,H,W,enemies,items,particles,game,tick){
    if(this.dying){
      this.dyingTimer++;
      this.vy+=0.4;this.y+=this.vy;
      if(this.dyingTimer>80)game.playerDied();
      return;
    }
    const inp=Input.state;
    const big=this.state==='big'||this.state==='fire';
    this.height=big?TILE*2-4:TILE-4;

    const run=inp.run;
    const maxVX=run?7:5;
    const accel=run?0.6:0.4;
    const decel=0.25;
    if(inp.left){this.vx=Math.max(this.vx-accel,-maxVX);this.dir=-1;}
    else if(inp.right){this.vx=Math.min(this.vx+accel,maxVX);this.dir=1;}
    else{if(Math.abs(this.vx)<decel)this.vx=0;else this.vx-=Math.sign(this.vx)*decel;}
    this.x+=this.vx;
    this.x=Math.max(0,Math.min(this.x,W*TILE-TILE));

    this.resolveHoriz(map,H,W);

    this.vy=Math.min(this.vy+GRAVITY,MAX_FALL);
    if(inp.jump&&this.onGround){
      this.vy=-12;this.jumpHeld=true;this.jumpTime=0;
      this.onGround=false;SoundManager.jump();
    }
    if(inp.jump&&this.jumpHeld&&!this.onGround){
      this.jumpTime++;
      if(this.jumpTime<14)this.vy=Math.min(this.vy,-8+this.jumpTime*0.5);
    }
    if(!inp.jump)this.jumpHeld=false;

    const prevOnGround=this.onGround;
    this.onGround=false;
    this.y+=this.vy;
    this.resolveVert(map,H,W,particles,game,tick);

    if(this.y>H*TILE+TILE)game.playerFallDied();

    this.frameTick++;
    if(this.onGround&&Math.abs(this.vx)>0.5&&this.frameTick%8===0)this.frame=1-this.frame;
    if(!this.onGround)this.frame=2;
    if(this.onGround&&Math.abs(this.vx)<0.5)this.frame=0;

    if(this.fireballCooldown > 0) this.fireballCooldown--;
    
    // Hệ thống bắn súng pistol lúc đầu và súng mới mạnh hơn
    if(Input.justPressed('fire') && this.fireballCooldown <= 0){
      if(this.weapon === 'pistol') {
        items.push(new Bullet(this.x + (this.dir === 1 ? this.width + 4 : -8), this.y + this.height/2, this.dir, 'pistol'));
      } else if(this.weapon === 'shotgun') {
        items.push(new Bullet(this.x + (this.dir === 1 ? this.width + 4 : -8), this.y + this.height/2, this.dir, 'shotgun', 0));
        items.push(new Bullet(this.x + (this.dir === 1 ? this.width + 4 : -8), this.y + this.height/2, this.dir, 'shotgun', -1.5));
        items.push(new Bullet(this.x + (this.dir === 1 ? this.width + 4 : -8), this.y + this.height/2, this.dir, 'shotgun', 1.5));
      }
      this.fireballCooldown = 15; SoundManager.fireball();
    }

    // Skill Khiên Năng Lượng
    if(inp.shield && this.hasShield && this.shieldActive <= 0) {
      this.shieldActive = 240;
    }
    if(this.shieldActive > 0) this.shieldActive--;

    // Skill Chưởng Năng Lượng
    if(inp.blast && this.hasBlast && this.fireballCooldown <= 0) {
      items.push(new BlastWave(this.x + (this.dir === 1 ? this.width + 4 : -24), this.y + this.height/2 - 20, this.dir));
      this.fireballCooldown = 30; SoundManager.fireball();
    }

    if(this.starTimer>0){this.starTimer--;}
    if(this.invincible>0)this.invincible--;

    if(!this.starTimer&&!this.invincible){
      for(const e of enemies){
        if(e.dead)continue;
        if(this.overlaps(e)){
          const stomping=prevOnGround===false&&this.vy>0&&this.bottom-this.vy<=e.top+8;
          if(stomping){
            this.vy=-8;e.stomped(items,particles,game);SoundManager.stomp();
          } else {
            this.hit(game);
          }
        }
      }
    } else if(this.starTimer>0){
      for(const e of enemies){
        if(!e.dead&&this.overlaps(e)){e.stomped(items,particles,game);SoundManager.stomp();}
      }
    }
  }

  overlaps(e){
    return this.right>e.left&&this.left<e.right&&this.bottom>e.top&&this.top<e.bottom;
  }

  hit(game){
    if(this.starTimer>0||this.invincible>0)return;
    if(this.state=='big'){this.state='small';this.height=TILE-4;this.invincible=90;SoundManager.die();}
    else if(this.state=='fire'){this.state='big';this.height=TILE*2-4;this.invincible=90;SoundManager.die();}
    else{this.startDying(game);}
  }

  startDying(game){
    this.dying=true;this.dyingTimer=0;this.vy=-14;SoundManager.die();
  }

  resolveHoriz(map,H,W){
    const big=this.state==='big'||this.state==='fire';
    const rows=[Math.floor(this.top/TILE),Math.floor((this.bottom-1)/TILE)];
    for(const r of rows){
      if(r<0||r>=H)continue;
      if(this.vx>0){
        const c=Math.floor(this.right/TILE);
        if(c<W&&isSolid(map[r]&&map[r][c])){this.x=c*TILE-this.width-2;this.vx=0;}
      } else if(this.vx<0){
        const c=Math.floor(this.left/TILE);
        if(c>=0&&isSolid(map[r]&&map[r][c])){this.x=(c+1)*TILE-2;this.vx=0;}
      }
    }
  }

  resolveVert(map,H,W,particles,game,tick){
    const big=this.state==='big'||this.state==='fire';
    const cols=[Math.floor(this.left/TILE),Math.floor((this.right-1)/TILE)];
    for(const c of cols){
      if(c<0||c>=W)continue;
      if(this.vy>0){
        const r=Math.floor(this.bottom/TILE);
        if(r<H&&isSolid(map[r]&&map[r][c])){
          this.y=r*TILE-this.height;this.vy=0;this.onGround=true;
        }
      } else if(this.vy<0){
        const r=Math.floor(this.top/TILE);
        if(r>=0&&r<H){
          const t=map[r][c];
          if(isSolid(t)){
            this.y=(r+1)*TILE;this.vy=0;
            if(t===T.QUESTION||t===T.INV){
              game.hitQuestion(r,c,particles,this.state);
            } else if(t===T.BRICK){
              game.breakBrick(r,c,particles);
            }
          }
        }
      }
    }
  }

  grow(to,game){
    if(to==='fire'&&(this.state==='big'||this.state==='fire')){this.state='fire';SoundManager.powerup();}
    else if(to==='big'&&this.state==='small'){this.state='big';this.height=TILE*2-4;SoundManager.powerup();}
    else if(to==='big'&&this.state==='big'){this.state='fire';SoundManager.powerup();}
    else return;
    game.addScore(1000);
    this.invincible=60;
  }

  activateStar(game){this.starTimer=300;SoundManager.powerup();game.addScore(1000);}

  draw(cam,tick){
    if(this.dying){drawMario(this.x,this.y,this.state,this.dir,2,cam);return;}
    if(this.invincible>0&&Math.floor(this.invincible/4)%2===0)return;
    drawMario(this.x,this.y,this.state,this.dir,this.frame,cam);

    // Hiệu ứng khi khiên năng lượng được kích hoạt
    if(this.shieldActive > 0) {
      ctx.strokeStyle = 'rgba(0, 150, 255, 0.7)'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(this.cx - cam.x, this.cy - cam.y, Math.max(this.width, this.height), 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function isSolid(t){
  return t===T.BRICK||t===T.HARD||t===T.QUESTION||t===T.USED||
         t===T.PIPE_T||t===T.PIPE_B||t===T.GROUND||t===T.STAIR||t===T.INV||t===T.COIN_B;
}

// ==================== ENEMIES ====================
class Goomba{
  constructor(x,y){
    this.x=x;this.y=y;this.vx=-1.5;this.vy=0;
    this.width=TILE-4;this.height=TILE-4;
    this.dead=false;this.squished=false;this.squishTimer=0;
    this.frame=0;this.frameTick=0;
  }
  get top(){return this.y;}
  get bottom(){return this.y+this.height;}
  get left(){return this.x+2;}
  get right(){return this.x+this.width+2;}
  stomped(items,particles,game){
    this.squished=true;this.squishTimer=30;game.addScore(100);
    for(let i=0;i<5;i++)particles.push(new Particle(this.x+16,this.y+16,(-2+Math.random()*4),(-3-Math.random()*3),'#7a4100',40,5));
  }
  update(map,H,W){
    if(this.squished){this.squishTimer--;if(this.squishTimer<=0)this.dead=true;return;}
    this.vy=Math.min(this.vy+GRAVITY,MAX_FALL);
    this.x+=this.vx;this.y+=this.vy;
    if(this.y>H*TILE){this.dead=true;return;}
    const r=Math.floor(this.bottom/TILE);
    if(r<H){
      const c1=Math.floor(this.left/TILE),c2=Math.floor(this.right/TILE);
      for(const c of[c1,c2]){
        if(c>=0&&c<W&&isSolid(map[r]&&map[r][c])){this.y=r*TILE-this.height;this.vy=0;}
      }
    }
    const cr=Math.floor((this.top+this.height/2)/TILE);
    if(this.vx<0){const cc=Math.floor(this.left/TILE);if(cc>=0&&cc<W&&isSolid(map[cr]&&map[cr][cc]))this.vx=1.5;}
    if(this.vx>0){const cc=Math.floor(this.right/TILE);if(cc>=0&&cc<W&&isSolid(map[cr]&&map[cr][cc]))this.vx=-1.5;}
    this.frameTick++;if(this.frameTick%12===0)this.frame=1-this.frame;
  }
  draw(cam){
    if(this.squished){
      const sx=Math.floor(this.x-cam.x),sy=Math.floor(this.y+this.height/2-cam.y);
      ctx.fillStyle='#7a4100';ctx.fillRect(sx+2,sy,28,10);
      ctx.fillStyle='#000';ctx.fillRect(sx+6,sy+2,4,4);ctx.fillRect(sx+20,sy+2,4,4);
      return;
    }
    drawGoomba(this.x,this.y,this.frame,cam);
  }
}

class Koopa{
  constructor(x,y){
    this.x=x;this.y=y;this.vx=-1;this.vy=0;
    this.width=TILE-4;this.height=TILE*2-4;
    this.dead=false;this.inShell=false;this.shellMoving=false;
    this.shellTimer=0;this.frame=0;this.frameTick=0;
  }
  get top(){return this.y;}
  get bottom(){return this.y+this.height;}
  get left(){return this.x+2;}
  get right(){return this.x+this.width+2;}
  stomped(items,particles,game){
    if(!this.inShell){
      this.inShell=true;this.vx=0;this.height=TILE-4;this.shellTimer=300;game.addScore(100);
    } else if(!this.shellMoving){
      this.shellMoving=true;this.vx=6;game.addScore(200);SoundManager.stomp();
    } else {
      this.shellMoving=false;this.vx=0;game.addScore(100);
    }
  }
  update(map,H,W,enemies,particles,game){
    if(this.shellTimer>0&&!this.shellMoving){this.shellTimer--;if(this.shellTimer<=0){this.inShell=false;this.vx=-1;this.height=TILE*2-4;}}
    this.vy=Math.min(this.vy+GRAVITY,MAX_FALL);
    this.x+=this.vx;this.y+=this.vy;
    if(this.y>H*TILE){this.dead=true;return;}
    const r=Math.floor(this.bottom/TILE);
    if(r<H){
      for(const c of[Math.floor(this.left/TILE),Math.floor(this.right/TILE)]){
        if(c>=0&&c<W&&isSolid(map[r]&&map[r][c])){this.y=r*TILE-this.height;this.vy=0;}
      }
    }
    const cr=Math.floor((this.top+this.height/2)/TILE);
    if(this.vx<0){const cc=Math.floor(this.left/TILE);if(cc>=0&&cc<W&&isSolid(map[cr]&&map[cr][cc])){this.vx=-this.vx;if(this.shellMoving)SoundManager.stomp();}}
    if(this.vx>0){const cc=Math.floor(this.right/TILE);if(cc>=0&&cc<W&&isSolid(map[cr]&&map[cr][cc])){this.vx=-this.vx;if(this.shellMoving)SoundManager.stomp();}}
    if(this.shellMoving){
      for(const e of enemies){
        if(e===this||e.dead)continue;
        if(this.right>e.left&&this.left<e.right&&this.bottom>e.top&&this.top<e.bottom){
          e.stomped([],particles,game);SoundManager.stomp();game.addScore(500);
          for(let i=0;i<6;i++)particles.push(new Particle(e.x+16,e.y+16,(-3+Math.random()*6),(-4-Math.random()*3),'#2d8a2d',40,5));
        }
      }
    }
    this.frameTick++;if(this.frameTick%12===0)this.frame=1-this.frame;
  }
  draw(cam){drawKoopa(this.x,this.y,this.frame,this.inShell,cam);}
}

// ==================== ITEMS ====================
class CoinItem{
  constructor(x,y,auto=false){
    this.x=x;this.y=y;this.vy=auto?-8:0;this.auto=auto;
    this.dead=false;this.spin=0;this.timer=auto?60:999;
    this.width=TILE-8;this.height=TILE-8;
  }
  get top(){return this.y;}get bottom(){return this.y+this.height;}
  get left(){return this.x+4;}get right(){return this.x+TILE-4;}
  update(map,H,W,player,particles,game){
    if(this.auto){
      this.vy+=0.5;this.y+=this.vy;this.timer--;
      if(this.timer<=0)this.dead=true;
      if(this.vy>0&&this.timer<40)this.dead=true;
    } else {
      this.spin+=0.12;
      if(player&&player.right>this.left&&player.left<this.right&&player.bottom>this.top&&player.top<this.bottom){
        game.addScore(200);game.coins++;SoundManager.coin();this.dead=true;
        for(let i=0;i<4;i++)particles.push(new Particle(this.x+16,this.y+8,(-2+Math.random()*4),(-4-Math.random()*2),'#ffd700',30,4));
      }
    }
  }
  draw(cam){if(!this.auto)drawCoin(this.x,this.y,this.spin,cam);}
}

class MushroomItem{
  constructor(x,y){this.x=x;this.y=y;this.vx=1.5;this.vy=-3;this.dead=false;this.width=TILE-4;this.height=TILE-4;}
  get top(){return this.y;}get bottom(){return this.y+this.height;}
  get left(){return this.x+2;}get right(){return this.x+this.width+2;}
  update(map,H,W,player,game){
    this.vy=Math.min(this.vy+0.3,8);this.x+=this.vx;this.y+=this.vy;
    if(this.y>H*TILE){this.dead=true;return;}
    const r=Math.floor(this.bottom/TILE);
    if(r<H){
      for(const c of[Math.floor(this.left/TILE),Math.floor(this.right/TILE)]){
        if(c>=0&&c<W&&isSolid(map[r]&&map[r][c])){this.y=r*TILE-this.height;this.vy=0;}
      }
    }
    const cr=Math.floor(this.y/TILE)+1;
    if(this.vx<0){const cc=Math.floor(this.left/TILE);if(cc>=0&&cc<W&&isSolid(map[cr]&&map[cr][cc]))this.vx=-this.vx;}
    if(this.vx>0){const cc=Math.floor(this.right/TILE);if(cc>=0&&cc<W&&isSolid(map[cr]&&map[cr][cc]))this.vx=-this.vx;}
    if(player&&player.right>this.left&&player.left<this.right&&player.bottom>this.top&&player.top<this.bottom){

class FlowerItem{
  constructor(x,y){this.x=x;this.startY=y;this.y=y+TILE;this.dead=false;this.frame=0;this.tick=0;this.risen=false;}
  get top(){return this.y;}get bottom(){return this.y+TILE;}
  get left(){return this.x;}get right(){return this.x+TILE;}
  update(map,H,W,player,game){
    if(!this.risen){this.y-=0.5;if(this.y<=this.startY)this.risen=true;}
    this.tick++;if(this.tick%12===0)this.frame=1-this.frame;
    if(player&&player.right>this.left&&player.left<this.right&&player.bottom>this.top&&player.top<this.bottom){
      player.grow('fire',game);this.dead=true;SoundManager.powerup();
    }
  }
  draw(cam){drawFlower(this.x,this.y,this.frame,cam);}
}

class StarItem{
  constructor(x,y){this.x=x;this.y=y;this.vx=2;this.vy=-8;this.dead=false;this.frame=0;this.tick=0;}
  get top(){return this.y;}get bottom(){return this.y+TILE;}
  get left(){return this.x;}get right(){return this.x+TILE;}
  update(map,H,W,player,game){
    this.vy=Math.min(this.vy+0.4,10);this.x+=this.vx;this.y+=this.vy;
    if(this.y>H*TILE){this.dead=true;return;}
    const r=Math.floor(this.bottom/TILE);
    if(r<H){
      for(const c of[Math.floor(this.left/TILE),Math.floor(this.right/TILE)]){
        if(c>=0&&c<W&&isSolid(map[r]&&map[r][c])){this.y=r*TILE-TILE;this.vy=-8;}
      }
    }
    this.tick++;if(this.tick%8===0)this.frame=1-this.frame;
    if(player&&player.right>this.left&&player.left<this.right&&player.bottom>this.top&&player.top<this.bottom){
      player.activateStar(game);this.dead=true;
    }

  draw(cam){drawStar(this.x,this.y,this.frame,cam);}
}

class Fireball{
  constructor(x,y,dir){this.x=x;this.y=y;this.vx=dir*10;this.vy=2;this.dir=dir;this.dead=false;this.bounce=0;}
  get top(){return this.y-8;}get bottom(){return this.y+8;}
  get left(){return this.x-8;}get right(){return this.x+8;}
  update(map,H,W,enemies,particles,game){
    this.vy=Math.min(this.vy+0.4,8);this.x+=this.vx;this.y+=this.vy;
    if(this.x<0||this.x>W*TILE||this.y>H*TILE){this.dead=true;return;}
    const r=Math.floor(this.bottom/TILE);
    if(r<H){
      for(const c of[Math.floor(this.left/TILE),Math.floor(this.right/TILE)]){
        if(c>=0&&c<W&&isSolid(map[r]&&map[r][c])){this.vy=-6;this.bounce++;if(this.bounce>3)this.dead=true;}
      }
    }
    const wr=Math.floor(this.y/TILE);
    if(this.vx>0){const c=Math.floor(this.right/TILE);if(c<W&&isSolid(map[wr]&&map[wr][c])){this.dead=true;}}
    if(this.vx<0){const c=Math.floor(this.left/TILE);if(c>=0&&isSolid(map[wr]&&map[wr][c])){this.dead=true;}}
    for(const e of enemies){
      if(e.dead)continue;
      if(this.right>e.left&&this.left<e.right&&this.bottom>e.top&&this.top<e.bottom){
        e.stomped([],particles,game);game.addScore(200);this.dead=true;
        for(let i=0;i<6;i++)particles.push(new Particle(this.x,this.y,(-3+Math.random()*6),(-3-Math.random()*3),'#f80',30,4));
      }
    }
  }
  draw(cam){if(!this.dead)drawFireball(this.x-8,this.y-8,cam);}
}

class ScorePopup{
  constructor(x,y,val){this.x=x;this.y=y;this.val=val;this.life=50;this.vy=-1;}
  update(){this.y+=this.vy;this.life--;}
  draw(cam){
    if(this.life<=0)return;
    ctx.globalAlpha=this.life/50;
    ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.textAlign='center';

  }
}

// ==================== GAME STATE ====================
const GAME={TITLE:0,PLAYING:1,PAUSED:2,DYING:3,LEVEL_CLEAR:4,GAME_OVER:5};

class Game{
  constructor(){
    this.state=GAME.TITLE;
    this.score=0;this.hiScore=+localStorage.getItem('marioHi')||0;
    this.coins=0;this.lives=3;this.time=400;this.timeTick=0;
    this.world='1-1';this.tick=0;
    this.flagY=TILE*3;this.flagMoving=false;this.levelClearTimer=0;
    this.map=null;this.W=0;this.H=0;
    this.player=null;this.enemies=[];this.items=[];this.particles=[];
    this.popups=[];this.camera=new Camera();
    this.usedBlocks=new Set();
    this.bgFast=false;this.bgStarted=false;
    this.titleTick=0;this.gameoverTimer=0;
    
    // Khởi tạo các điểm Set Point Tiếp Diễn để không bị quay lại lúc đầu
    this.setPoints=[40*TILE, 90*TILE, 135*TILE];
    this.currentRespawnX=2*TILE;
    this.boss=null;
    this.bossSpawned=false;
    this.bossAlertTimer=0;
  }
  startGame(){
    this.score=0;this.coins=0;this.lives=3;this.time=400;
    this.currentRespawnX=2*TILE;
    this.startLevel();
    this.state=GAME.PLAYING;
    SoundManager.init();
    SoundManager.playBG(false);
    this.bgStarted=true;
  }
  startLevel(){
    const ld=buildLevel();
    this.map=ld.map;this.W=ld.W;this.H=ld.H;
    this.player=new Player();
    
    // Áp dụng vị trí Set Point hiện tại
    this.player.x=this.currentRespawnX;
    this.player.y=10*TILE;
    
    this.enemies=[];this.items=[];this.particles=[];this.popups=[];
    this.usedBlocks=new Set();
    this.flagY=TILE*3;this.flagMoving=false;this.levelClearTimer=0;
    this.time=400;this.timeTick=0;this.bgFast=false;
    this.camera=new Camera();
    
    this.boss=null;
    this.bossSpawned=false;
    this.bossAlertTimer=0;

    const enemySpots=[
      {t:'goomba',c:18,r:13},{t:'goomba',c:30,r:13},{t:'koopa',c:40,r:12},
      {t:'goomba',c:56,r:13},{t:'goomba',c:57,r:13},{t:'goomba',c:65,r:13},
      {t:'koopa',c:72,r:13},{t:'goomba',c:86,r:13},{t:'goomba',c:92,r:13},
      {t:'koopa',c:100,r:12},{t:'goomba',c:115,r:13},{t:'goomba',c:125,r:13}
    ];
    for(const s of enemySpots){
      const x=s.c*TILE,y=s.r*TILE;
      if(s.t==='goomba')this.enemies.push(new Goomba(x,y));
      else this.enemies.push(new Koopa(x,y));
    }
    for(let r=0;r<this.H;r++){for(let c=0;c<this.W;c++){
      if(this.map[r][c]===T.COIN_B)this.items.push(new CoinItem(c*TILE,r*TILE));
    }}
  }
  addScore(v){
    this.score+=v;
    if(this.score>this.hiScore){this.hiScore=this.score;localStorage.setItem('marioHi',this.hiScore);}
  }
  hitQuestion(r,c,particles,marioState){
    const key=`${r}_${c}`;
    if(this.usedBlocks.has(key))return;
    this.usedBlocks.add(key);
    this.map[r][c]=T.USED;

    // Tỉ lệ phá khối rơi ra súng mới mạnh hơn và các skill kĩ năng (Phần thưởng từ Question Block)
    let dropRng = Math.random();
    if(dropRng < 0.35) {
      let pool = ['shotgun', 'shield', 'blast'];
      let chosen = pool[Math.floor(Math.random() * pool.length)];
      this.items.push(new SkillItem(c*TILE, (r-1)*TILE, chosen));
      return;
    }

    const content=qContents[key]||'coin';
    const px=c*TILE,py=(r-1)*TILE;
    for(let i=0;i<4;i++)particles.push(new Particle(px+8+i*4,py+TILE,(-2+i),(-4-Math.random()*2),'#ffd700',30,4));
    if(content==='coin'){
      this.items.push(new CoinItem(c*TILE,r*TILE,true));
      this.addScore(200);this.coins++;SoundManager.coin();
      this.popups.push(new ScorePopup(c*TILE+16,py,'+200'));
    } else if(content==='mushroom'){
      if(marioState==='small')this.items.push(new MushroomItem(c*TILE,r*TILE));
      else this.items.push(new FlowerItem(c*TILE,r*TILE));
    } else if(content==='flower'){
      this.items.push(new FlowerItem(c*TILE,r*TILE));
    } else if(content==='star'){
      this.items.push(new StarItem(c*TILE,r*TILE));
    }
  }
  breakBrick(r,c,particles){
    const key=`${r}_${c}`;
    if(this.usedBlocks.has(key))return;
    this.usedBlocks.add(key);
    this.map[r][c]=T.AIR;SoundManager.breakBrick();this.addScore(50);
    for(let i=0;i<8;i++)particles.push(new Particle(c*TILE+16,r*TILE+16,(-4+Math.random()*8),(-6-Math.random()*4),'#c84b10',50,6));
    this.popups.push(new ScorePopup(c*TILE+16,(r-1)*TILE,'+50'));

    // Tỉ lệ rơi ra kĩ năng/vũ khí khi phá khối gạch thường
    if(Math.random() < 0.25) {
      let pool = ['shotgun', 'shield', 'blast'];
      let chosen = pool[Math.floor(Math.random() * pool.length)];
      this.items.push(new SkillItem(c*TILE, (r-1)*TILE, chosen));
    }
  }
  playerDied(){
    this.lives--;
    if(this.lives<=0){
      this.state=GAME.GAME_OVER;SoundManager.stopBG();SoundManager.gameOver();
      this.gameoverTimer=180;
    } else {
      this.startLevel();this.state=GAME.PLAYING;
    }
  }
  playerFallDied(){
    const p=this.player;
    p.dying=true;p.vy=-14;p.dyingTimer=0;SoundManager.die();SoundManager.stopBG();
  }
  checkFlag(){
    const p=this.player;
    const flagX=199*TILE;
    if(p.x+p.width>=flagX&&!this.flagMoving){
      this.flagMoving=true;SoundManager.flagpole();SoundManager.stopBG();
      this.addScore(Math.max(100,Math.floor((400-this.time)*10)));
      this.levelClearTimer=180;
    }
    if(this.flagMoving){
      if(this.flagY<(this.H-2)*TILE)this.flagY+=4;
      p.x=flagX+4;p.vx=0;p.vy=1;
    }
  }
  update(){
    if(this.state===GAME.TITLE){this.titleTick++;return;}
    if(this.state===GAME.PAUSED)return;
    if(this.state===GAME.GAME_OVER){this.gameoverTimer--;return;}
    if(this.state===GAME.LEVEL_CLEAR){
      this.levelClearTimer--;
      if(this.levelClearTimer<=0){this.state=GAME.TITLE;SoundManager.stopBG();}
      return;
    }
    this.tick++;
    this.timeTick++;
    if(this.timeTick>=60){this.timeTick=0;this.time=Math.max(0,this.time-1);}
    if(this.time<=100&&!this.bgFast){this.bgFast=true;SoundManager.stopBG();SoundManager.playBG(true);}
    if(this.time<=0&&!this.player.dying){this.player.startDying(this);}

    const p=this.player;
    p.update(this.map,this.H,this.W,this.enemies,this.items,this.particles,this,this.tick);
    
    // Cập nhật các điểm Set Point khi người chơi đi qua đoạn đường chỉ định
    for(let pt of this.setPoints) {
      if(p.x > pt && pt > this.currentRespawnX) {
        this.currentRespawnX = pt;
      }
    }

    // Kích hoạt Boss xuất hiện khi đi tới đoạn col 140
    if(p.x > 140 * TILE && !this.bossSpawned) {
      this.bossSpawned = true;
      this.bossAlertTimer = 180; // Thông báo xuất hiện trong 3 giây
      this.boss = new BossKarinDepTrai(this.camera.x + CANVAS_W + 80, 5 * TILE);
    }

    if(this.bossAlertTimer > 0) this.bossAlertTimer--;

    if(!p.dying&&!this.flagMoving)this.checkFlag();
    if(this.flagMoving&&this.levelClearTimer>0){
      this.levelClearTimer--;
      if(this.levelClearTimer<=0){this.state=GAME.LEVEL_CLEAR;this.levelClearTimer=180;}
    }
    this.camera.follow(p,this.W);

    if(this.boss) {
      this.boss.update(this.map, this.H, this.W, p, this);
    }

    for(const e of this.enemies){
      if(e instanceof Koopa)e.update(this.map,this.H,this.W,this.enemies,this.particles,this);
      else e.update(this.map,this.H,this.W);
    }
    this.enemies=this.enemies.filter(e=>!e.dead||e.squishTimer>0);
    for(const it of this.items){
      if(it instanceof CoinItem)it.update(this.map,this.H,this.W,p,this.particles,this);
      else if(it instanceof Fireball)it.update(this.map,this.H,this.W,this.enemies,this.particles,this);
      else if(it instanceof Bullet)it.update(this.map,this.H,this.W,this.enemies,this.boss,this.particles,this);
      else if(it instanceof BlastWave)it.update(this.map,this.H,this.W,this.enemies,this.boss,this.particles,this);
      else it.update(this.map,this.H,this.W,p,this);
    }
    this.items=this.items.filter(i=>!i.dead);
    for(const pt of this.particles)pt.update();
    this.particles=this.particles.filter(p=>p.life>0);
    for(const pp of this.popups)pp.update();
    this.popups=this.popups.filter(p=>p.life>0);
  }
  draw(){
    ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
    if(this.state===GAME.TITLE){this.drawTitle();return;}
    if(this.state===GAME.GAME_OVER){this.drawGameOver();return;}
    drawBG(this.camera, this.tick);
    
    const cam=this.camera;
    const startC=Math.max(0,Math.floor(cam.x/TILE));
    const endC=Math.min(this.W,startC+Math.ceil(CANVAS_W/TILE)+2);
    for(let r=0;r<this.H;r++){
      for(let c=startC;c<endC;c++){
        const t=this.map[r][c];
        if(t!==T.AIR&&t!==T.INV)drawTile(r,c,t,cam,this.tick);
      }
    }
    drawFlagpole(199*TILE,cam,this.flagY);
    for(const it of this.items)it.draw(cam);
    for(const e of this.enemies)e.draw(cam);
    for(const pt of this.particles)pt.draw(ctx,cam);
    
    if(this.boss) this.boss.draw(cam);

    // Hiển thị dòng thông báo màu đỏ báo: boss karin spawn khi boss xuất hiện
    if(this.bossAlertTimer > 0) {
      ctx.fillStyle = '#ff0000'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
      ctx.fillText('boss karin spawn', CANVAS_W / 2, CANVAS_H / 2 - 80);
    }

    this.player.draw(cam,this.tick);
    for(const pp of this.popups)pp.draw(cam);
    this.drawHUD();
    if(this.state===GAME.PAUSED)this.drawPause();
    if(this.state===GAME.LEVEL_CLEAR)this.drawLevelClear();
  }
  drawHUD(){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,CANVAS_W,40);
    ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.textAlign='left';
    ctx.fillText(`MARIO`,10,22);
    ctx.fillText(`${String(this.score).padStart(6,'0')}`,10,38);
    
    // Yêu cầu 5: khi chơi game ở góc cũng có hiện ở góc: Created by cuong24
    ctx.fillStyle='#ffd700'; ctx.font='bold 13px monospace';
    ctx.fillText(`Created by cuong24`, 10, 58);

    ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
    ctx.fillText(`🪙 x${String(this.coins).padStart(2,'0')}`,CANVAS_W/2-60,30);
    ctx.fillText(`WORLD`,CANVAS_W/2,22);ctx.fillText(this.world,CANVAS_W/2,38);
    ctx.fillText(`TIME`,CANVAS_W/2+120,22);
    ctx.fillStyle=this.time<=100?'#f00':'#fff';
    ctx.fillText(`${this.time}`,CANVAS_W/2+120,38);
    ctx.fillStyle='#fff';
    ctx.textAlign='right';
    ctx.fillText(`♥x${this.lives}`,CANVAS_W-10,22);
    ctx.fillText(`HI ${String(this.hiScore).padStart(6,'0')}`,CANVAS_W-10,38);
  }
  drawPause(){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle='#fff';ctx.font='bold 48px monospace';ctx.textAlign='center';
    ctx.fillText('PAUSE',CANVAS_W/2,CANVAS_H/2);
  }
  drawLevelClear(){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle='#ffd700';ctx.font='bold 48px monospace';ctx.textAlign='center';
    ctx.fillText('COURSE CLEAR!',CANVAS_W/2,CANVAS_H/2-40);
  }
  drawGameOver(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle='#fff';ctx.font='bold 64px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',CANVAS_W/2,CANVAS_H/2-30);
  }
  drawTitle(){
    ctx.fillStyle='#5c94fc';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle='#228B22';ctx.fillRect(0,CANVAS_H-60,CANVAS_W,12);
    ctx.fillStyle='#8B4513';ctx.fillRect(0,CANVAS_H-48,CANVAS_W,48);

    ctx.fillStyle='rgba(255,255,255,0.9)';
    [[80,80],[220,60],[400,100],[550,70],[700,90]].forEach(([x,y])=>{
      ctx.fillRect(x,y,80,30);ctx.fillRect(x-20,y+10,120,25);
    });

    const tx=CANVAS_W/2,ty=120;
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=8;
    ctx.fillStyle='#c00';ctx.font='bold 36px monospace';ctx.textAlign='center';
    ctx.fillText('☆ SUPER ☆',tx,ty-10);
    ctx.fillStyle='#ffd700';ctx.font='bold 72px monospace';
    ctx.strokeStyle='#c00';ctx.lineWidth=4;
    ctx.strokeText('MARIO BROS',tx,ty+60);ctx.fillText('MARIO BROS',tx,ty+60);
    ctx.shadowBlur=0;

    // Yêu cầu 5: ở menu giao diện game có thêm: Created by cuong24
    ctx.fillStyle='#ffffff';ctx.font='bold 20px monospace';ctx.textAlign='center';
    ctx.fillText('Created by cuong24', CANVAS_W/2, ty+105);

    const bw=200,bh=50,bx=CANVAS_W/2-bw/2;
    const pulse=0.5+0.5*Math.sin(this.titleTick*0.08);

    ctx.fillStyle=`rgba(255,${Math.floor(180+75*pulse)},0,0.95)`;
    ctx.beginPath();ctx.roundRect(bx,CANVAS_H/2+60,bw,bh,12);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(bx,CANVAS_H/2+60,bw,bh,12);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText('▶ START',CANVAS_W/2,CANVAS_H/2+93);

    ctx.fillStyle='#fff';ctx.font='18px monospace';
    ctx.fillText(`HI-SCORE: ${String(this.hiScore).padStart(6,'0')}`,CANVAS_W/2,CANVAS_H-20);
  }
  handleClick(mx,my){
    if(this.state===GAME.TITLE){
      const bx=CANVAS_W/2-100;
      if(mx>=bx&&mx<=bx+200&&my>=CANVAS_H/2+60&&my<=CANVAS_H/2+110){this.startGame();}
      return;
    }
    if(this.state===GAME.GAME_OVER&&this.gameoverTimer<=0){
      this.state=GAME.TITLE;this.score=0;this.coins=0;this.lives=3;return;
    }
    if(this.state===GAME.LEVEL_CLEAR){this.state=GAME.TITLE;return;}
  }
  togglePause(){
    if(this.state===GAME.PLAYING){this.state=GAME.PAUSED;SoundManager.stopBG();}
    else if(this.state===GAME.PAUSED){this.state=GAME.PLAYING;SoundManager.playBG(this.bgFast);}
  }
}

// ==================== MAIN LOOP ====================
const game=new Game();
let lastTime=0;

function loop(ts){
  const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  Input.update();
  if(Input.state&&document.activeElement!==null){
    if(window._justPressedP){game.togglePause();window._justPressedP=false;}
  }
  game.update();
  game.draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(e.code==='KeyP'){window._justPressedP=true;}
  if(e.code==='Enter'&&(game.state===GAME.TITLE||game.state===GAME.GAME_OVER)){
    if(game.state===GAME.TITLE)game.startGame();
    else if(game.gameoverTimer<=0){game.state=GAME.TITLE;game.score=0;game.lives=3;game.coins=0;}
  }
});

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=CANVAS_W/rect.width,scaleY=CANVAS_H/rect.height;
  const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;
  game.handleClick(mx,my);
  SoundManager.init();
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const scaleX=CANVAS_W/rect.width,scaleY=CANVAS_H/rect.height;
  const t=e.touches[0];
  const mx=(t.clientX-rect.left)*scaleX,my=(t.clientY-rect.top)*scaleY;
  game.handleClick(mx,my);
  SoundManager.init();
},{passive:false});

document.getElementById('btnPause').addEventListener('click',()=>game.togglePause());
document.getElementById('btnSound').addEventListener('click',()=>SoundManager.toggleMute());
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());

requestAnimationFrame(loop);
})();
</script>
