<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .btn {
            display: inline-block;
            background: white;
            color: #764ba2;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Xin chào!</h1>
        <p>Đây là website đầu tiên của tôi trên GitHub Pages</p>
        <p>🌐 Domain: <strong>crazlive.github.io</strong></p>
        <a href="#" class="btn">Khám phá ngay</a>
        <br><br>
        <small>© 2026 - Created with ❤️</small>
    </div>
</body>
</html>
